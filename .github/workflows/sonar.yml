# SonarCloud analysis for fork PRs.
# Fork PRs can't access SONAR_TOKEN in the CI workflow (GitHub security policy).
# This workflow triggers after CI completes, runs in the upstream repo context
# (with secrets access), and performs PR analysis using artifacts from CI.
# Upstream pushes and same-repo PRs are analyzed inline in ci.yml.
name: SonarCloud

permissions:
  contents: read

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  sonar:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'pull_request'
      && github.event.workflow_run.head_repository.full_name != github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 at 6.4.2026
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage
          path: app/coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download PR metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: pr-metadata
          path: /tmp/pr-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load PR metadata
        id: pr
        run: |
          echo "number=$(cat /tmp/pr-metadata/number)" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(cat /tmp/pr-metadata/head_ref)" >> "$GITHUB_OUTPUT"
          echo "base_ref=$(cat /tmp/pr-metadata/base_ref)" >> "$GITHUB_OUTPUT"

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        with:
          args: >
            -Dsonar.pullrequest.key=${{ steps.pr.outputs.number }}
            -Dsonar.pullrequest.branch=${{ steps.pr.outputs.head_ref }}
            -Dsonar.pullrequest.base=${{ steps.pr.outputs.base_ref }}
            -Dsonar.scm.revision=${{ github.event.workflow_run.head_sha }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
