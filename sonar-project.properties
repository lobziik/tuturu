sonar.projectKey=lobziik_tuturu
sonar.organization=lobziik

sonar.sources=app/src
sonar.tests=app/src
sonar.test.inclusions=**/*.test.ts

sonar.javascript.lcov.reportPaths=app/coverage/lcov.info

sonar.exclusions=**/node_modules/**,**/public/**,**/dist/**

# Coverage exclusions: UI components (Preact/DOM), browser-API services
# (WebSocket, WebRTC, getUserMedia, pointer events), side-effect orchestration
# (effects depend on browser APIs via refs), and the render-only entry point.
# These files cannot be meaningfully unit tested without a real browser environment.
sonar.coverage.exclusions=\
  **/client/components/**,\
  **/client/services/websocket.ts,\
  **/client/services/webrtc.ts,\
  **/client/services/media.ts,\
  **/client/services/pip-drag.ts,\
  **/client/state/effects/**,\
  **/client/index.tsx,\
  **/server/worker-bin.ts,\
  **/server/worker-smoke-test.ts,\
  **/server/index.ts
