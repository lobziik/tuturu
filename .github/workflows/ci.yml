name: CI

permissions:
  contents: read

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint_typecheck_format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 at 6.4.2026

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2 at 6.4.2026
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: app
        run: bun install

      - name: TypeScript typecheck
        working-directory: app
        run: bun run typecheck

      - name: ESLint
        working-directory: app
        run: bun run lint

      - name: Stylelint
        working-directory: app
        run: bun run lint:css

      - name: Prettier check
        working-directory: app
        run: bun run format:check

      - name: Dead code check
        working-directory: app
        run: bun run lint:dead

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 at 6.4.2026

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2 at 6.4.2026
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: app
        run: bun install

      - name: Build client
        working-directory: app
        run: bun run build

      - name: Run tests
        working-directory: app
        run: bun run test
